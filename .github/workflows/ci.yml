name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-racer-efi
    steps:
      - uses: actions/checkout@v5
        with:
          path: embedded/sigma-racer-efi

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy
          targets: thumbv7em-none-eabihf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-racer-efi

      - name: Host tests
        run: cargo test

      - name: Host clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Firmware clippy
        run: cargo clippy --features firmware,engine-yamaha-cp3 --target thumbv7em-none-eabihf -- -D warnings

      - name: Firmware release build
        run: cargo build --features firmware,engine-yamaha-cp3 --target thumbv7em-none-eabihf --release
